name: farmas_mobile
description: Controle financeiro pessoal e familiar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Banco de dados local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Gráficos
  fl_chart: ^0.70.0

  # Geração de PDF
  pdf: ^3.11.1
  printing: ^5.13.2

  # Navegação
  go_router: ^14.3.0

  # Gerenciamento de estado
  flutter_riverpod: ^2.6.1

  # Formatação de datas e moeda
  intl: ^0.19.0

  # Importar/exportar arquivos
  file_picker: ^8.1.6

  # Compartilhar arquivos
  share_plus: ^10.0.2

  # Notificações locais
  flutter_local_notifications: ^17.2.3

  # UUID
  uuid: ^4.5.1

  # Path de pastas do sistema
  path_provider: ^2.1.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/data/
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
